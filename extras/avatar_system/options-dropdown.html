<!-- Place inside the "Layout" tab of the options panel.
     Sits naturally between the gesture-sensitivity slider and any
     other layout-related toggles. -->
<div class="opts-section">
  <div class="opts-st">Agent avatar</div>
  <select class="opts-sel" id="opts-avatar" onchange="setAvatarMode(this.value)">
    <option value="off">Off</option>
    <option value="crab" selected>Crab (default)</option>
    <option value="cat">ASCII cat</option>
    <option value="dot">Coloured dot</option>
  </select>
</div>
